<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claves ASFA</title>
<style>
  :root {
    --bg: #1a1e2e;
    --surface: #232844;
    --surface2: #2d3358;
    --border: #3a4070;
    --accent: #4a7cff;
    --accent2: #2ecc8a;
    --danger: #e05252;
    --warn: #f0a030;
    --text: #dde3f8;
    --text-dim: #8892b0;
    --input-bg: #1a1e2e;
    --row-even: #1e2338;
    --row-odd: #232844;
    --row-hover: #2d3a6a;
    --header-bg: #141828;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    background: var(--header-bg);
    border-bottom: 2px solid var(--border);
    padding: 0 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    height: 58px;
  }

  .logo-block {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .logo-icon {
    width: 38px; height: 38px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    font-weight: 900;
    color: #fff;
    letter-spacing: -1px;
  }

  .logo-text {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }

  .logo-sub {
    font-size: 10px;
    color: var(--text-dim);
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .divider-v {
    width: 1px;
    height: 30px;
    background: var(--border);
    flex-shrink: 0;
  }

  .btn-group {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }

  .btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border: none;
    border-radius: 6px;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn:hover { filter: brightness(1.15); }
  .btn:active { transform: scale(0.97); }

  .btn-danger  { background: var(--danger);  color: #fff; }
  .btn-import  { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-export  { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-primary { background: var(--accent);  color: #fff; }
  .btn-success { background: var(--accent2); color: #111; }
  .btn-add     { background: var(--surface2); color: var(--accent2); border: 1px solid var(--accent2); }

  .btn-icon { font-size: 14px; }

  .check-wrap {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: var(--text-dim);
    cursor: pointer;
    flex-shrink: 0;
    user-select: none;
  }

  .check-wrap input[type=checkbox] {
    width: 14px; height: 14px;
    accent-color: var(--accent);
    cursor: pointer;
  }

  .spacer { flex: 1; }

  .stats-bar {
    display: flex;
    gap: 16px;
    align-items: center;
    flex-shrink: 0;
  }

  .stat-item {
    font-size: 12px;
    color: var(--text-dim);
  }

  .stat-item strong {
    color: var(--accent);
  }

  /* ── Search bar ── */
  .search-bar {
    background: var(--header-bg);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    max-width: 380px;
  }

  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 14px;
    pointer-events: none;
  }

  .search-input {
    width: 100%;
    padding: 6px 10px 6px 32px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }

  .search-input:focus { border-color: var(--accent); }

  .search-clear {
    position: absolute;
    right: 8px;
    top: 50%; transform: translateY(-50%);
    background: none; border: none;
    color: var(--text-dim); cursor: pointer;
    font-size: 16px; line-height: 1;
    display: none;
  }

  .search-clear.visible { display: block; }

  .filter-label {
    font-size: 12px;
    color: var(--text-dim);
  }

  .result-count {
    font-size: 12px;
    color: var(--text-dim);
    margin-left: auto;
  }

  .result-count span { color: var(--accent); font-weight: 600; }

  /* ── Table ── */
  .table-wrap {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
  }

  .table-wrap::-webkit-scrollbar { width: 8px; }
  .table-wrap::-webkit-scrollbar-track { background: var(--bg); }
  .table-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .table-wrap::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  thead {
    position: sticky;
    top: 0;
    z-index: 10;
  }

  thead th {
    background: var(--header-bg);
    border-bottom: 2px solid var(--border);
    padding: 8px 12px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-dim);
    text-align: left;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }

  thead th:hover { color: var(--text); }

  thead th .sort-icon {
    margin-left: 4px;
    opacity: 0.4;
    font-size: 10px;
  }

  thead th.sorted .sort-icon { opacity: 1; color: var(--accent); }

  thead th:nth-child(1) { width: 60px; text-align: center; } /* # row */
  thead th:nth-child(2) { width: 120px; }  /* usuario */
  thead th:nth-child(3) { width: 120px; }  /* clave */
  thead th:nth-child(4) { width: auto; }   /* nombre */
  thead th:nth-child(5) { width: 80px; text-align: center; } /* acciones */

  tbody tr {
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.1s;
  }

  tbody tr:nth-child(even) { background: var(--row-even); }
  tbody tr:nth-child(odd)  { background: var(--row-odd); }
  tbody tr:hover { background: var(--row-hover); }
  tbody tr.editing { background: #2a3a60 !important; }
  tbody tr.new-row { background: #1e3a28 !important; animation: flash-in 0.4s ease; }

  @keyframes flash-in {
    from { background: #2ecc8a33; }
    to { background: #1e3a28; }
  }

  td {
    padding: 5px 12px;
    font-size: 13px;
    vertical-align: middle;
  }

  td:nth-child(1) {
    color: var(--text-dim);
    font-size: 11px;
    text-align: center;
  }

  td.num-cell {
    font-family: 'Consolas', 'Courier New', monospace;
    font-weight: 600;
    letter-spacing: 1px;
  }

  .cell-usuario { color: #7eb8ff; }
  .cell-clave   { color: #f0a030; }
  .cell-nombre  { }

  /* Editable cells */
  td[contenteditable="true"] {
    outline: none;
    background: rgba(74,124,255,0.12);
    border-radius: 3px;
    padding: 3px 10px;
    cursor: text;
  }

  td[contenteditable="true"]:focus {
    background: rgba(74,124,255,0.22);
    box-shadow: inset 0 0 0 1px var(--accent);
  }

  td[contenteditable="true"].error {
    background: rgba(224,82,82,0.18);
    box-shadow: inset 0 0 0 1px var(--danger);
  }

  /* Action buttons in row */
  .row-actions {
    display: flex;
    gap: 4px;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.15s;
  }

  tr:hover .row-actions, tr.editing .row-actions { opacity: 1; }

  .row-btn {
    width: 24px; height: 24px;
    border: none; border-radius: 4px;
    font-size: 13px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.1s;
  }

  .row-btn:hover { transform: scale(1.1); }
  .row-btn-del { background: rgba(224,82,82,0.2); color: var(--danger); }
  .row-btn-del:hover { background: var(--danger); color: #fff; }
  .row-btn-ok  { background: rgba(46,204,138,0.2); color: var(--accent2); }
  .row-btn-ok:hover  { background: var(--accent2); color: #111; }

  /* ── Status bar ── */
  .status-bar {
    background: var(--header-bg);
    border-top: 1px solid var(--border);
    padding: 4px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    font-size: 11px;
    color: var(--text-dim);
    min-height: 26px;
  }

  .status-msg { flex: 1; }
  .status-msg.ok   { color: var(--accent2); }
  .status-msg.err  { color: var(--danger); }
  .status-msg.warn { color: var(--warn); }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.visible { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    min-width: 340px;
    max-width: 480px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: modal-in 0.2s ease;
  }

  @keyframes modal-in {
    from { transform: scale(0.92) translateY(-10px); opacity: 0; }
    to   { transform: scale(1) translateY(0); opacity: 1; }
  }

  .modal h3 {
    font-size: 16px; margin-bottom: 16px;
    color: var(--text);
    display: flex; align-items: center; gap: 8px;
  }

  .modal p { font-size: 13px; color: var(--text-dim); margin-bottom: 20px; line-height: 1.5; }

  .modal-input-group {
    margin-bottom: 14px;
  }

  .modal-input-group label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 5px;
  }

  .modal-input {
    width: 100%;
    padding: 8px 12px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
    font-family: 'Consolas', monospace;
  }

  .modal-input:focus { border-color: var(--accent); }
  .modal-input.error { border-color: var(--danger); }

  .modal-hint { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
  .modal-hint.error { color: var(--danger); }

  .modal-footer {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 20px;
  }

  .btn-modal-cancel {
    background: var(--surface2); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 18px; font-size: 13px; cursor: pointer;
  }

  .btn-modal-ok {
    background: var(--accent); color: #fff;
    border: none; border-radius: 6px;
    padding: 8px 18px; font-size: 13px; cursor: pointer;
    font-weight: 600;
  }

  .btn-modal-ok:hover { filter: brightness(1.1); }

  .warn-icon { color: var(--warn); }
  .ok-icon   { color: var(--accent2); }

  /* Highlight search matches */
  mark {
    background: rgba(240,160,48,0.35);
    color: inherit;
    border-radius: 2px;
    padding: 0 1px;
  }

  /* No data row */
  .no-data td {
    text-align: center;
    padding: 40px;
    color: var(--text-dim);
    font-size: 14px;
  }
</style>
</head>
<body>

<!-- ══════════════════════ HEADER ══════════════════════ -->
<div class="header">
  <div class="logo-block">
    <div class="logo-icon">A</div>
    <div>
      <div class="logo-text">Claves ASFA</div>
      <div class="logo-sub">Gestión de usuarios</div>
    </div>
  </div>

  <div class="divider-v"></div>

  <div class="btn-group">
    <button class="btn btn-danger"  onclick="limpiar()"  title="Elimina todos los usuarios">
      <span class="btn-icon">🗑</span> Limpiar
    </button>
    <button class="btn btn-import"  onclick="importarDAT()" title="Importa fichero .dat">
      <span class="btn-icon">📂</span> Importar DAT
    </button>
    <button class="btn btn-export"  onclick="exportarDAT()" title="Exporta fichero .dat">
      <span class="btn-icon">💾</span> Exportar DAT
    </button>
    <button class="btn btn-primary" onclick="generarBIN()" title="Genera fichero .BIN para ASFA">
      <span class="btn-icon">⚙</span> Generar BIN
    </button>
  </div>

  <label class="check-wrap" title="Verificar que no existan usuarios duplicados antes de generar el BIN">
    <input type="checkbox" id="chkDuplicados" checked>
    Verificar duplicados
  </label>

  <div class="spacer"></div>

  <button class="btn btn-add" onclick="addRow()">
    <span class="btn-icon">＋</span> Nuevo usuario
  </button>

  <div class="divider-v"></div>

  <div class="stats-bar">
    <div class="stat-item">Usuarios: <strong id="statTotal">0</strong></div>
  </div>
</div>

<!-- ══════════════════════ SEARCH BAR ══════════════════════ -->
<div class="search-bar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="searchInput"
           placeholder="Buscar por nº usuario, clave o nombre…"
           oninput="onSearch(this)">
    <button class="search-clear" id="searchClear" onclick="clearSearch()">×</button>
  </div>
  <span class="filter-label">Buscar en:</span>
  <label style="font-size:12px;color:var(--text-dim);cursor:pointer">
    <input type="checkbox" id="filterUsuario" checked onchange="renderTable()"> Nº Usuario
  </label>
  <label style="font-size:12px;color:var(--text-dim);cursor:pointer">
    <input type="checkbox" id="filterClave" checked onchange="renderTable()"> Clave
  </label>
  <label style="font-size:12px;color:var(--text-dim);cursor:pointer">
    <input type="checkbox" id="filterNombre" checked onchange="renderTable()"> Nombre
  </label>
  <div class="result-count" id="resultCount"></div>
</div>

<!-- ══════════════════════ TABLE ══════════════════════ -->
<div class="table-wrap">
  <table id="mainTable">
    <thead>
      <tr>
        <th title="Fila">#</th>
        <th onclick="sortBy('usuario')" id="hUsuario">Nº Usuario <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('clave')"   id="hClave">Clave <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('nombre')"  id="hNombre">Nombre y Apellidos <span class="sort-icon">↕</span></th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<!-- ══════════════════════ STATUS BAR ══════════════════════ -->
<div class="status-bar">
  <span class="status-msg" id="statusMsg">Listo</span>
  <span>v1.5</span>
</div>

<!-- ══════════════════════ MODAL ══════════════════════ -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalBox">
    <!-- filled dynamically -->
  </div>
</div>

<!-- Hidden file input -->
<input type="file" id="fileInput" accept=".dat" style="display:none" onchange="onFileSelected(this)">

<script>
// ════════════════════════════════════════════════
// DATA
// ════════════════════════════════════════════════
const INITIAL_DATA = [];

// ════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════
let data = INITIAL_DATA.map((r, i) => ({ ...r, _id: i }));
let nextId = data.length;
let sortField = null;
let sortAsc = true;
let searchTerm = '';

// ════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════
function padNum(n, len=4) {
  return String(parseInt(n) || 0).padStart(len, '0');
}

function setStatus(msg, type='') {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = 'status-msg ' + type;
}

function updateStats() {
  document.getElementById('statTotal').textContent = data.length;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlight(text, term) {
  if (!term) return escapeHtml(text);
  const re = new RegExp(term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi');
  return escapeHtml(text).replace(re, m => `<mark>${m}</mark>`);
}

// ════════════════════════════════════════════════
// TABLE RENDERING
// ════════════════════════════════════════════════
function getFiltered() {
  const q = searchTerm.trim().toLowerCase();
  const fU = document.getElementById('filterUsuario').checked;
  const fC = document.getElementById('filterClave').checked;
  const fN = document.getElementById('filterNombre').checked;
  if (!q) return [...data];
  return data.filter(r => {
    if (fU && r.usuario.toLowerCase().includes(q)) return true;
    if (fC && r.clave.toLowerCase().includes(q)) return true;
    if (fN && r.nombre.toLowerCase().includes(q)) return true;
    return false;
  });
}

function getSorted(rows) {
  if (!sortField) return rows;
  return [...rows].sort((a,b) => {
    let va = a[sortField], vb = b[sortField];
    if (sortField !== 'nombre') { va = parseInt(va)||0; vb = parseInt(vb)||0; }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });
}

function renderTable() {
  const q = searchTerm.trim().toLowerCase();
  const filtered = getFiltered();
  const sorted = getSorted(filtered);

  const tbody = document.getElementById('tableBody');

  if (sorted.length === 0) {
    tbody.innerHTML = `<tr class="no-data"><td colspan="5">
      ${data.length === 0 ? '📂 No hay usuarios. Usa <strong>Importar DAT</strong> o <strong>Nuevo usuario</strong>.' : '🔍 Ningún resultado para "' + escapeHtml(q) + '"'}
    </td></tr>`;
  } else {
    tbody.innerHTML = sorted.map((row, idx) => {
      const u = highlight(padNum(row.usuario), q);
      const c = highlight(padNum(row.clave), q);
      const n = highlight(row.nombre, q);
      return `<tr data-id="${row._id}">
        <td>${idx+1}</td>
        <td class="num-cell cell-usuario">${u}</td>
        <td class="num-cell cell-clave">${c}</td>
        <td class="cell-nombre">${n}</td>
        <td>
          <div class="row-actions">
            <button class="row-btn row-btn-del" onclick="deleteRow(${row._id})" title="Eliminar">🗑</button>
          </div>
        </td>
      </tr>`;
    }).join('');
  }

  // Result count
  const rc = document.getElementById('resultCount');
  if (q) {
    rc.innerHTML = `<span>${filtered.length}</span> de ${data.length} usuarios`;
  } else {
    rc.textContent = '';
  }

  // Sort headers
  ['usuario','clave','nombre'].forEach(f => {
    const id = 'h' + f.charAt(0).toUpperCase() + f.slice(1);
    const el = document.getElementById(id);
    el.classList.toggle('sorted', sortField === f);
    const icon = el.querySelector('.sort-icon');
    icon.textContent = (sortField === f) ? (sortAsc ? '↑' : '↓') : '↕';
  });

  updateStats();
}

function sortBy(field) {
  if (sortField === field) sortAsc = !sortAsc;
  else { sortField = field; sortAsc = true; }
  renderTable();
}

function onSearch(input) {
  searchTerm = input.value;
  document.getElementById('searchClear').classList.toggle('visible', searchTerm.length > 0);
  renderTable();
}

function clearSearch() {
  searchTerm = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').classList.remove('visible');
  renderTable();
}

// ════════════════════════════════════════════════
// ROW OPERATIONS
// ════════════════════════════════════════════════
function deleteRow(id) {
  const idx = data.findIndex(r => r._id === id);
  if (idx === -1) return;
  const r = data[idx];
  data.splice(idx, 1);
  renderTable();
  setStatus(`Usuario ${padNum(r.usuario)} (${r.nombre}) eliminado.`, 'warn');
}

function addRow() {
  showAddModal();
}

// ════════════════════════════════════════════════
// VALIDATION
// ════════════════════════════════════════════════
function validateNum(val, field) {
  const n = parseInt(val);
  if (isNaN(n) || n < 0 || n > 9999) return `El ${field} debe ser un número entre 0 y 9999.`;
  return null;
}

// ════════════════════════════════════════════════
// MODAL
// ════════════════════════════════════════════════
let modalCallback = null;

function showModal(html, callback) {
  document.getElementById('modalBox').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('visible');
  modalCallback = callback;
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('visible');
  modalCallback = null;
}

function showAddModal() {
  showModal(`
    <h3>＋ Nuevo usuario</h3>
    <div class="modal-input-group">
      <label>Nº Usuario (0000–9999)</label>
      <input class="modal-input" id="mi_usuario" type="number" min="0" max="9999" placeholder="0000" autofocus>
    </div>
    <div class="modal-input-group">
      <label>Clave (0000–9999)</label>
      <input class="modal-input" id="mi_clave" type="number" min="0" max="9999" placeholder="0000">
    </div>
    <div class="modal-input-group">
      <label>Nombre y Apellidos</label>
      <input class="modal-input" id="mi_nombre" type="text" placeholder="Nombre Apellido1 Apellido2" style="font-family:inherit">
    </div>
    <div class="modal-footer">
      <button class="btn-modal-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-modal-ok" onclick="confirmAdd()">Añadir</button>
    </div>
  `);
  setTimeout(() => document.getElementById('mi_usuario')?.focus(), 50);
}

function confirmAdd() {
  const u = document.getElementById('mi_usuario').value.trim();
  const c = document.getElementById('mi_clave').value.trim();
  const n = document.getElementById('mi_nombre').value.trim();

  let err = validateNum(u, 'nº de usuario') || validateNum(c, 'clave');
  if (!err && !n) err = 'El nombre no puede estar vacío.';

  if (err) { setStatus(err, 'err'); closeModal(); return; }

  data.push({ usuario: String(parseInt(u)), clave: String(parseInt(c)), nombre: n, _id: nextId++ });
  renderTable();
  closeModal();
  setStatus(`Usuario ${padNum(u)} (${n}) añadido.`, 'ok');
}

document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ════════════════════════════════════════════════
// LIMPIAR
// ════════════════════════════════════════════════
function limpiar() {
  if (data.length === 0) { setStatus('Ya no hay datos.', 'warn'); return; }
  showModal(`
    <h3><span class="warn-icon">⚠</span> Limpiar tabla</h3>
    <p>Se eliminarán los <strong>${data.length} usuarios</strong> cargados actualmente.<br>Esta acción no se puede deshacer.</p>
    <div class="modal-footer">
      <button class="btn-modal-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-modal-ok" style="background:var(--danger)" onclick="confirmLimpiar()">Sí, limpiar todo</button>
    </div>
  `);
}

function confirmLimpiar() {
  const n = data.length;
  data = [];
  renderTable();
  closeModal();
  setStatus(`Tabla limpiada (${n} usuarios eliminados).`, 'warn');
}

// ════════════════════════════════════════════════
// IMPORTAR DAT
// ════════════════════════════════════════════════
function importarDAT() {
  document.getElementById('fileInput').click();
}

function onFileSelected(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const lines = e.target.result.split(/\r?\n/).filter(l => l.trim());
    const newData = [];
    let errors = 0;
    for (let i = 0; i < lines.length; i++) {
      const parts = lines[i].split(',');
      if (parts.length < 3) { errors++; continue; }
      const u = parts[0].trim();
      const c = parts[1].trim();
      const n = parts.slice(2).join(',').trim();
      if (validateNum(u,'u') || validateNum(c,'c') || !n) { errors++; continue; }
      if (newData.length >= 1000) break;
      newData.push({ usuario: String(parseInt(u)), clave: String(parseInt(c)), nombre: n, _id: nextId++ });
    }
    if (data.length > 0) {
      // Ask whether to replace or append
      showModal(`
        <h3>📂 Importar DAT</h3>
        <p>Se han leído <strong>${newData.length} usuarios</strong> de <em>${escapeHtml(file.name)}</em>${errors ? ` (${errors} líneas ignoradas)` : ''}.<br><br>
        La tabla actual contiene <strong>${data.length} usuarios</strong>. ¿Desea reemplazarlos o añadir los nuevos?</p>
        <div class="modal-footer">
          <button class="btn-modal-cancel" onclick="closeModal()">Cancelar</button>
          <button class="btn-modal-cancel" onclick="doImport(${JSON.stringify(newData).replace(/"/g,'&quot;')}, false)">Añadir</button>
          <button class="btn-modal-ok" onclick="doImport(${JSON.stringify(newData).replace(/"/g,'&quot;')}, true)">Reemplazar</button>
        </div>
      `);
    } else {
      doImport(newData, true);
    }
    input.value = '';
  };
  reader.readAsText(file, 'windows-1252');
}

function doImport(newData, replace) {
  if (replace) {
    data = newData;
  } else {
    if (data.length + newData.length > 1000) {
      setStatus('Se ha alcanzado el máximo de 1000 usuarios.', 'err');
      closeModal(); return;
    }
    data = [...data, ...newData];
  }
  renderTable();
  closeModal();
  setStatus(`Se han leído ${newData.length} usuarios.`, 'ok');
}

// ════════════════════════════════════════════════
// EXPORTAR DAT
// ════════════════════════════════════════════════
function exportarDAT() {
  if (data.length === 0) { setStatus('No hay datos para exportar.', 'warn'); return; }
  showModal(`
    <h3>💾 Exportar DAT</h3>
    <div class="modal-input-group">
      <label>Nombre del fichero (sin extensión)</label>
      <input class="modal-input" id="me_nombre" type="text" value="clavesasfa" autofocus>
    </div>
    <div class="modal-footer">
      <button class="btn-modal-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-modal-ok" onclick="confirmExportarDAT()">Generar</button>
    </div>
  `);
  setTimeout(() => { const el = document.getElementById('me_nombre'); el?.focus(); el?.select(); }, 50);
}

function confirmExportarDAT() {
  const fname = (document.getElementById('me_nombre').value.trim() || 'clavesasfa') + '.dat';
  const lines = data.map(r => `${padNum(r.usuario)}, ${padNum(r.clave)}, ${r.nombre}`);
  const blob = new Blob([lines.join('\r\n')], { type: 'text/plain;charset=utf-8' });
  downloadBlob(blob, fname);
  closeModal();
  setStatus(`Fichero ${fname} generado con ${data.length} usuarios.`, 'ok');
}

// ════════════════════════════════════════════════
// GENERAR BIN
// ════════════════════════════════════════════════
function generarBIN() {
  if (data.length === 0) { setStatus('No hay datos para generar el fichero BIN.', 'warn'); return; }

  // Check duplicates if checkbox is on
  if (document.getElementById('chkDuplicados').checked) {
    const seen = {};
    for (const r of data) {
      const u = parseInt(r.usuario);
      if (seen[u] !== undefined) {
        setStatus(`Usuario duplicado: ${padNum(u)} aparece más de una vez.`, 'err');
        showModal(`
          <h3><span class="warn-icon">⚠</span> Usuario duplicado</h3>
          <p>El usuario <strong>${padNum(u)}</strong> está duplicado en la tabla.<br>
          Corrija el error antes de generar el fichero BIN.</p>
          <div class="modal-footer">
            <button class="btn-modal-ok" onclick="closeModal()">Aceptar</button>
          </div>
        `);
        return;
      }
      seen[u] = true;
    }
  }

  // Validate all
  for (let i = 0; i < data.length; i++) {
    const r = data[i];
    const u = parseInt(r.usuario);
    const c = parseInt(r.clave);
    const fila = i + 2;
    if (isNaN(u) || u > 9999) { setStatus(`Fila ${fila}: nº usuario > 9999`, 'err'); return; }
    if (isNaN(c) || r.clave === '') { setStatus(`Fila ${fila}: clave vacía`, 'err'); return; }
    if (c > 9999) { setStatus(`Fila ${fila}: clave > 9999`, 'err'); return; }
    if (!r.nombre) { setStatus(`Fila ${fila}: nombre vacío`, 'err'); return; }
  }

  showModal(`
    <h3>⚙ Generar fichero BIN</h3>
    <div class="modal-input-group">
      <label>Número de versión</label>
      <input class="modal-input" id="mg_version" type="number" min="1" max="9999" placeholder="1" autofocus>
      <div class="modal-hint">Este valor se usa como factor de codificación del fichero.</div>
    </div>
    <div class="modal-footer">
      <button class="btn-modal-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-modal-ok" onclick="confirmGenerarBIN()">Generar</button>
    </div>
  `);
  setTimeout(() => document.getElementById('mg_version')?.focus(), 50);
}

function confirmGenerarBIN() {
  const fStr = document.getElementById('mg_version').value.trim();
  const f = parseInt(fStr);
  if (!fStr || isNaN(f) || f < 1) { setStatus('Número de versión inválido.', 'err'); closeModal(); return; }

  // Build DATAS array (same logic as VBA)
  const DATAS = [];
  for (const r of data) {
    const valor1 = parseInt(r.usuario);
    const valor2 = parseInt(r.clave);
    DATAS.push(valor1);
    DATAS.push(valor2 + valor1);
    DATAS.push(valor1 ^ (valor1 + valor2));
  }

  const indice = DATAS.length;
  let tam = f * indice;
  let marca = false;

  // Write bytes backwards into temp buffer
  const temp = [];
  for (let i = indice - 1; i >= 0; i--) {
    let tt = DATAS[i] + tam;
    if (tt > 65535) marca = true;
    // Write as little-endian 16-bit (te is Integer in VBA = 2 bytes)
    temp.push(tt & 0xFF);
    temp.push((tt >> 8) & 0xFF);
    tam -= f;
  }

  // Strip zero bytes (pairs where the 16-bit value = 0)
  // VBA: Get #2,,te / If te<>0 Then Put #3,,te
  // te is Integer (signed 16-bit), reads 2 bytes at a time
  const output = [];
  for (let i = 0; i < temp.length; i += 2) {
    const lo = temp[i], hi = temp[i+1];
    const val = lo | (hi << 8);
    if (val !== 0) {
      output.push(lo);
      output.push(hi);
    }
  }

  const bytes = new Uint8Array(output);
  const blob = new Blob([bytes], { type: 'application/octet-stream' });
  const fname = 'clavesasfa' + f + '.BIN';
  downloadBlob(blob, fname);
  closeModal();

  let msg = `Fichero ${fname} generado (${data.length} usuarios, ${bytes.length} bytes).`;
  if (marca) msg += ' ⚠ Podría dar problemas con algunas versiones de las apps ASFA.';
  setStatus(msg, marca ? 'warn' : 'ok');
}

// ════════════════════════════════════════════════
// DOWNLOAD HELPER
// ════════════════════════════════════════════════
function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ════════════════════════════════════════════════
// KEYBOARD SHORTCUT: Enter in modals
// ════════════════════════════════════════════════
document.getElementById('modalBox').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const btn = document.querySelector('#modalBox .btn-modal-ok');
    if (btn) btn.click();
  }
});

// INIT

renderTable();
setStatus(`${data.length} usuarios cargados.`, 'ok');
</script>
